<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 376" role="img"
     aria-label="Placeholder terminal session for pg_kafka">
  <style>
    .bg { fill: #1f1f24; }
    .bar { fill: #2e2e34; }
    .t { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; font-size: 15px; }
    .prompt { fill: #4ade80; }
    .cmd { fill: #e8e8e3; }
    .out { fill: #a3a39c; }
    .dim { fill: #6b6b73; }
    .key { fill: #f0c674; }
  </style>
  <rect class="bg" x="0" y="0" width="760" height="376" rx="10"/>
  <rect class="bar" x="0" y="0" width="760" height="30" rx="10"/>
  <rect class="bar" x="0" y="16" width="760" height="14"/>
  <circle cx="20" cy="15" r="5" fill="#ff5f56"/>
  <circle cx="38" cy="15" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="15" r="5" fill="#27c93f"/>
  <text class="t dim" x="380" y="20" text-anchor="middle">pg_kafka — Postgres as a Kafka broker</text>

  <text class="t" x="20" y="64"><tspan class="prompt">$ </tspan><tspan class="cmd">echo "key1:value1" | kcat -P -b localhost:9092 -t demo -K:</tspan></text>

  <text class="t" x="20" y="98"><tspan class="prompt">$ </tspan><tspan class="cmd">kcat -C -b localhost:9092 -t demo -o beginning -e</tspan></text>
  <text class="t out" x="20" y="122">key1:value1</text>

  <text class="t" x="20" y="160"><tspan class="prompt">$ </tspan><tspan class="cmd">psql -c "SELECT key, value FROM kafka.messages;"</tspan></text>
  <text class="t out" x="20" y="184"> key  | value</text>
  <text class="t dim" x="20" y="206">------+--------</text>
  <text class="t" x="20" y="228"><tspan class="key"> key1 </tspan><tspan class="out">| value1</tspan></text>
  <text class="t dim" x="20" y="250">(1 row)</text>

  <text class="t dim" x="20" y="300"># the broker and the table are the same data —</text>
  <text class="t dim" x="20" y="322"># produced over the Kafka wire protocol, read back as SQL.</text>

  <text class="t dim" x="20" y="358">placeholder · the live asciinema recording lands here after the first CI run</text>
</svg>
