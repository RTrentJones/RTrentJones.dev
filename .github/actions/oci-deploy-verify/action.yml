name: 'OCI deploy + verify'
description: >
  Resolve an oci tool's container instance by display name, restart it (re-pull the GHCR image),
  and verify prod. Shared by the greenlight-deploy-<tool> and greenlight-remediate-<tool>
  workflows (bamcp, polyphony) so the resolve→deploy→verify logic lives in ONE place. The caller
  must have already run actions/checkout + mise + `pnpm install` (this calls `pnpm exec greenlight`).
inputs:
  tool-name:
    description: Manifest tool name = the instance display name (bamcp, polyphony, ...)
    required: false
    default: 'bamcp'
  oci-tenancy:
    description: OCI tenancy OCID
    required: true
  oci-user:
    description: OCI user OCID
    required: true
  oci-fingerprint:
    description: OCI API key fingerprint
    required: true
  oci-private-key:
    description: OCI API private key (PEM)
    required: true
  oci-region:
    description: OCI region
    required: true
  oci-compartment:
    description: OCI compartment OCID (falls back to the tenancy/root when empty)
    required: false
    default: ''
  verify-token:
    description: BAMCP_VERIFY_TOKEN — enables bamcp's authenticated mcp verify; empty → the anonymous checks alone gate (polyphony's api spec needs no token)
    required: false
    default: ''
runs:
  using: composite
  steps:
    # Bound the major so an unattended self-heal/deploy can't pull a breaking oci-cli release (same
    # philosophy as the Terraform provider pins). ~=3.0 → >=3.0,<4.0.
    - run: pip install --quiet 'oci-cli~=3.0'
      shell: bash
    - name: Deploy (resolve instance OCID by name -> restart -> re-pull GHCR image)
      shell: bash
      env:
        # The OCI CLI reuses the SAME TF_VAR_OCI_* secrets the apply uses — one secret set.
        OCI_CLI_TENANCY: ${{ inputs.oci-tenancy }}
        OCI_CLI_USER: ${{ inputs.oci-user }}
        OCI_CLI_FINGERPRINT: ${{ inputs.oci-fingerprint }}
        OCI_CLI_KEY_CONTENT: ${{ inputs.oci-private-key }}
        OCI_CLI_REGION: ${{ inputs.oci-region }}
        OCI_COMPARTMENT_ID: ${{ inputs.oci-compartment }}
        TOOL_NAME: ${{ inputs.tool-name }}
      run: |
        # The instance OCID is abstracted from the developer: resolve it from OCI by the
        # instance's display name (= the tool name, set by the oci-container-instance module).
        # No manually-fetched/stored OCID secret. Compartment falls back to the tenancy (root).
        set -o pipefail
        COMPARTMENT="${OCI_COMPARTMENT_ID:-$OCI_CLI_TENANCY}"
        echo "Resolving '$TOOL_NAME' (region=$OCI_CLI_REGION)…"
        oci container-instances container-instance list \
          --compartment-id "$COMPARTMENT" --display-name "$TOOL_NAME" --all > list.json \
          || { echo "::error::oci list failed (auth/region/compartment) — see output above"; exit 1; }
        # OCIDs are identifiers, not secrets (tenancy/compartment are masked by Actions).
        echo "Matches:"; jq -r '(.data.items // .data // [])[]? | "  \(.["lifecycle-state"] // "?")  \(.id)"' list.json
        OCID=$(jq -r '[(.data.items // .data // [])[]? | select((.["lifecycle-state"] // "")=="ACTIVE") | .id][0] // ""' list.json)
        if [ -z "$OCID" ]; then
          echo "::error::no ACTIVE container instance named '$TOOL_NAME' in compartment $COMPARTMENT"
          exit 1
        fi
        echo "Resolved $TOOL_NAME instance: $OCID"
        OCI_CONTAINER_INSTANCE_OCID="$OCID" pnpm exec greenlight deploy "$TOOL_NAME" --env prod
    - name: Verify prod (gate the signal on real health, not just the restart)
      shell: bash
      env:
        # BAMCP_VERIFY_TOKEN (optional) enables bamcp's authenticated functional/eval mcp check;
        # absent → the anonymous checks alone gate. Polyphony's api spec reads no token — passing
        # an empty verify-token is the norm there. verify has a built-in readiness wait, so this
        # covers re-pull + container start (and Polyphony's boot-time migrations) before asserting.
        BAMCP_VERIFY_TOKEN: ${{ inputs.verify-token }}
        TOOL_NAME: ${{ inputs.tool-name }}
      run: pnpm exec greenlight verify "$TOOL_NAME" --env prod
