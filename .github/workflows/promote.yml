name: promote

# Explicit, gated develop -> main fast-forward, SHA-pinned end to end:
# capture develop's tip -> verify beta @sha -> FF main to exactly that sha -> ship prod @sha.
# (A GITHUB_TOKEN push doesn't trigger deploy.yml, so this job owns the prod ship.)
on:
  workflow_dispatch:
    inputs:
      name:
        description: manifest entry to promote
        required: true
        default: blog

permissions:
  contents: write

# Never interrupt an in-flight promotion; one at a time.
concurrency:
  group: promote
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    env:
      # env-indirect the dispatch input so it's never interpolated into a shell `run:` line.
      NAME: ${{ inputs.name }}
      # Stage-event telemetry into tracer (ship/preview POST per-stage records). Best-effort
      # (5s cap, never fails the ship) — an absent token just drops the beacon.
      GREENLIGHT_INGEST_URL: https://tracer.rtrentjones.dev/api/ingest
      TRACER_INGEST_TOKEN: ${{ secrets.TF_VAR_TRACER_INGEST_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      - run: git fetch --no-tags origin main develop

      # Capture develop's tip — the commit that gets beta-verified, promoted, and prod-shipped.
      # Pinning the whole chain to this one sha closes the verify->promote TOCTOU: if develop moves
      # after the beta verify, `promote --commit` limits the FF to the verified sha (or refuses a
      # sha that never landed on develop).
      - name: Capture the verified sha
        id: sha
        run: echo "sha=$(git rev-parse origin/develop)" >> "$GITHUB_OUTPUT"

      - name: Validate tool name (allow-list ↔ manifest)
        run: |
          # Allow-list mirrors greenlight.config.ts (blog + the tools[] array). The CLI also validates,
          # but reject an unknown/metachar name here before it reaches any `pnpm exec` command line.
          case "$NAME" in
            blog | heistmind | bamcp | tracer | muse | polyphony) ;;
            *) echo "::error::unknown tool '$NAME' (allowed: blog heistmind bamcp tracer muse polyphony)"; exit 1 ;;
          esac

      - name: Check Cloudflare creds
        id: creds
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF" ]; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi

      # A missing cred may skip an ACTION (a deploy), never a CHECK. Without creds the beta verify
      # below would skip — and the previously-unconditional Promote step would fast-forward
      # develop -> main UNVERIFIED. Fail loudly instead of silently dropping the gate. (Mirrors
      # the framework's own promote workflow.)
      - name: Require verification creds
        if: steps.creds.outputs.have != '1'
        run: |
          echo "::error::promotion requires verification — set CLOUDFLARE_API_TOKEN so the beta gate runs before develop->main."
          exit 1

      - name: Verify beta (gate, sha-pinned)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec greenlight verify "$NAME" --env beta --expect-sha "${{ steps.sha.outputs.sha }}"

      - name: Promote (gated fast-forward)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm exec greenlight promote "$NAME" --perform --push --commit "${{ steps.sha.outputs.sha }}"

      # The FF moved origin/main, but this job's working tree still holds the DISPATCH ref (main
      # as of dispatch time) — building prod from it ships the PRE-promotion code, and the
      # GITHUB_TOKEN push above never re-triggers deploy.yml, so promoted code would never
      # actually reach prod. Check out exactly the promoted sha (already local — it's develop's tip).
      - name: Check out the promoted commit
        run: |
          git checkout --detach "${{ steps.sha.outputs.sha }}"
          pnpm install --frozen-lockfile

      - name: Ship prod (build -> deploy -> SHA-gated verify -> rollback on failure)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec greenlight ship "$NAME" --env prod --expect-sha "${{ steps.sha.outputs.sha }}"
