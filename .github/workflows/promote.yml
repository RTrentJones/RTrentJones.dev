name: promote

# Explicit, gated develop -> main fast-forward: verify beta -> FF -> deploy + verify prod.
# (A GITHUB_TOKEN push doesn't trigger deploy.yml, so this job owns the prod deploy.)
on:
  workflow_dispatch:
    inputs:
      name:
        description: manifest entry to promote
        required: true
        default: blog

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile
      - run: git fetch --no-tags origin main develop

      - name: Check Cloudflare creds
        id: creds
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF" ]; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi

      - name: Verify beta (gate)
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec greenlight verify "${{ inputs.name }}" --env beta

      - name: Promote (gated fast-forward)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pnpm exec greenlight promote "${{ inputs.name }}" --perform --push

      - name: Deploy + verify prod
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm exec greenlight deploy "${{ inputs.name }}" --env prod
          pnpm exec greenlight verify "${{ inputs.name }}" --env prod
