name: deploy-muse

# Agent "muse" — a cron-triggered Cloudflare Worker (Gemini-backed). Emitted by `greenlight add`.
# On a push to main touching tools/muse, or manually: deploys the Worker, sets its secrets from
# GitHub secrets, seeds the first run, and verifies. Creds-guarded (skips if the secrets are absent).
on:
  push:
    branches: [main]
    paths: ['tools/muse/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-muse
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile

      - name: Check creds
        id: creds
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GK: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -n "$CF" ] && [ -n "$GK" ]; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy + Worker secrets + seed
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RUN_TOKEN: ${{ secrets.RUN_TOKEN }}
        run: |
          cd tools/muse
          # Account id as code: resolve the (non-secret) account id from the domain's zone and inject
          # it into wrangler.toml — wrangler can't call /memberships to auto-discover it with a scoped
          # token. Derived, so the repo keeps the REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID placeholder.
          ACCT=$(curl -fsS "https://api.cloudflare.com/client/v4/zones?name=rtrentjones.dev" -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" | jq -r '.result[0].account.id // empty')
          if [ -z "$ACCT" ]; then echo "::error::could not resolve the Cloudflare account id for rtrentjones.dev (token needs Zone:Read?)"; exit 1; fi
          sed -i "s/REPLACE_WITH_CLOUDFLARE_ACCOUNT_ID/$ACCT/g" wrangler.toml
          # KV namespace as code: find-or-create the STATE namespace (idempotent), then inject its id
          # into wrangler.toml for this deploy. The id is non-secret + derived, so the repo keeps the
          # REPLACE_WITH_KV_NAMESPACE_ID placeholder — no manual create, no hardcoded id.
          ID=$(pnpm exec wrangler kv namespace list 2>/dev/null | jq -r '.[] | select(.title | test("muse.*STATE")) | .id' | head -1)
          if [ -z "$ID" ] || [ "$ID" = "null" ]; then
            pnpm exec wrangler kv namespace create STATE || true
            ID=$(pnpm exec wrangler kv namespace list 2>/dev/null | jq -r '.[] | select(.title | test("muse.*STATE")) | .id' | head -1)
          fi
          if [ -z "$ID" ] || [ "$ID" = "null" ]; then echo "::error::could not resolve the STATE KV namespace id (token needs Workers KV Storage:Edit?)"; exit 1; fi
          sed -i "s/REPLACE_WITH_KV_NAMESPACE_ID/$ID/g" wrangler.toml
          pnpm exec wrangler deploy --env prod
          printf '%s' "$GEMINI_API_KEY" | pnpm exec wrangler secret put GEMINI_API_KEY --env prod
          printf '%s' "$RUN_TOKEN" | pnpm exec wrangler secret put RUN_TOKEN --env prod
          cd ../..
          # Seed the first run (the cron is daily). Retry while the custom domain propagates.
          for i in $(seq 1 8); do
            if curl -fsS -XPOST "https://muse.rtrentjones.dev/run" -H "Authorization: Bearer $RUN_TOKEN" >/dev/null; then
              echo "seeded"; break
            fi
            echo "seed attempt $i: not ready, retrying in 10s"; sleep 10
          done

      - name: Verify
        if: steps.creds.outputs.have == '1'
        run: pnpm exec greenlight verify muse --env prod

      - name: Skip notice
        if: steps.creds.outputs.have != '1'
        run: echo "Missing CLOUDFLARE_API_TOKEN or GEMINI_API_KEY — muse deploy skipped."
