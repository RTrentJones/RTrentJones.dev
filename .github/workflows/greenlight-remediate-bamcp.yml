name: greenlight-remediate-bamcp

# Auto-heal: the keepalive Worker dispatches remediate-bamcp when bamcp (oci) is unreachable.
on:
  repository_dispatch:
    types: [remediate-bamcp]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Same group as greenlight-deploy-bamcp: a self-heal never overlaps a deploy or another heal, and
# re-applying an already-healthy instance is idempotent (no diff) — anti-flap with no extra state.
concurrency:
  group: deploy-bamcp
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: '~1.10'
          terraform_wrapper: false
      # This is the ONE unattended, auto-approved terraform path in the repo — an idle-reclaimed
      # box must heal with no human awake, so it cannot ride infra.yml's manual-approval gate. It
      # therefore carries its own safety: plan -> destroy-guard -> apply THE PLAN. Even a
      # -target'ed heal must never destroy a stateful store (the same backstop infra.yml
      # enforces); scoping to module.bamcp_instance limits blast radius, the guard enforces it.
      - name: Plan + guard + apply the heal (recreate the instance if OCI idle-reclaimed it)
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }} # HCP state backend auth
          TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          TF_VAR_oci_private_key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
          TF_VAR_oci_compartment_id: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
        run: |
          if [ -z "$TF_TOKEN_app_terraform_io" ]; then
            echo "::warning::no TF_API_TOKEN — skipping re-apply; will still attempt a restart below"
            exit 0
          fi
          terraform -chdir=infra init -input=false
          # -target pulls in the instance's deps (the bamcp_network module) automatically.
          terraform -chdir=infra plan -input=false -out=tf.plan -target=module.bamcp_instance
          # Destroy-guard (matches infra.yml's): refuse if the heal would delete/replace a
          # stateful data store. Matches by resource TYPE, so address renames can't dodge it.
          terraform -chdir=infra show -json tf.plan > heal-plan.json
          BAD=$(jq '[.resource_changes[]? | select((.change.actions | index("delete")) and (.type | test("supabase_project|neon_project|neon_branch")))] | length' heal-plan.json)
          if [ "$BAD" != "0" ]; then
            echo "::error::heal plan would destroy $BAD stateful store resource(s) — refusing to auto-apply. Use the gated infra workflow."
            exit 1
          fi
          terraform -chdir=infra apply -input=false tf.plan
      # Same resolve→restart→verify as greenlight-deploy-bamcp (shared composite). The terraform
      # re-apply above recreates the box if it was reclaimed; this then restarts + re-pulls + gates.
      - uses: ./.github/actions/oci-deploy-verify
        with:
          oci-tenancy: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.TF_VAR_OCI_REGION }}
          oci-compartment: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
          verify-token: ${{ secrets.BAMCP_VERIFY_TOKEN }}
      - name: Escalate if the self-heal failed
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REASON: ${{ github.event.client_payload.reason || 'manual/unknown' }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="remediate-bamcp: self-heal FAILED"
          BODY="Automatic remediation for bamcp (reason: $REASON) did not bring prod back. Manual attention needed. Run: $RUN_URL"
          # De-dup: a sustained outage fires this every cron tick — comment on the existing open
          # keepalive issue instead of stacking identical ones (alert fatigue).
          EXISTING=$(gh issue list --repo "${{ github.repository }}" --state open --label keepalive \
            --search "$TITLE in:title" --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "${{ github.repository }}" --body "Still failing — $BODY" || true
          else
            gh issue create --repo "${{ github.repository }}" --title "$TITLE" --body "$BODY" --label keepalive || true
          fi
