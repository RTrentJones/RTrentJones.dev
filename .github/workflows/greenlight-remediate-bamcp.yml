name: greenlight-remediate-bamcp

# Auto-heal: the keepalive Worker dispatches remediate-bamcp when bamcp (oci) is unreachable.
on:
  repository_dispatch:
    types: [remediate-bamcp]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Same group as greenlight-deploy-bamcp: a self-heal never overlaps a deploy or another heal, and
# re-applying an already-healthy instance is idempotent (no diff) — anti-flap with no extra state.
concurrency:
  group: deploy-bamcp
  cancel-in-progress: false

jobs:
  remediate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.10'
          terraform_wrapper: false
      - name: Re-apply the instance (recreate it if OCI idle-reclaimed the Always-Free box)
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }} # HCP state backend auth
          TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          TF_VAR_oci_private_key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
          TF_VAR_oci_compartment_id: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
        run: |
          if [ -z "$TF_TOKEN_app_terraform_io" ]; then
            echo "::warning::no TF_API_TOKEN — skipping re-apply; will still attempt a restart below"
            exit 0
          fi
          terraform -chdir=infra init -input=false
          # -target pulls in the instance's deps (the bamcp_network module) automatically.
          terraform -chdir=infra apply -input=false -auto-approve -target=module.bamcp_instance
      - run: pip install --quiet oci-cli
      - name: Deploy (resolve instance OCID by name -> restart -> re-pull GHCR image)
        env:
          # The OCI CLI reuses the SAME TF_VAR_OCI_* secrets the apply uses — one secret set.
          OCI_CLI_TENANCY: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          OCI_CLI_USER: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          OCI_CLI_FINGERPRINT: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          OCI_CLI_REGION: ${{ secrets.TF_VAR_OCI_REGION }}
          OCI_COMPARTMENT_ID: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
        run: |
          # The instance OCID is abstracted from the developer: resolve it from OCI by the
          # instance's display name (= the tool name, set by the oci-container-instance module).
          # No manually-fetched/stored OCID secret. Compartment falls back to the tenancy (root).
          set -o pipefail
          COMPARTMENT="${OCI_COMPARTMENT_ID:-$OCI_CLI_TENANCY}"
          echo "Resolving 'bamcp' (region=$OCI_CLI_REGION)…"
          oci container-instances container-instance list \
            --compartment-id "$COMPARTMENT" --display-name bamcp --all > list.json \
            || { echo "::error::oci list failed (auth/region/compartment) — see output above"; exit 1; }
          # OCIDs are identifiers, not secrets (tenancy/compartment are masked by Actions).
          echo "Matches:"; jq -r '(.data.items // .data // [])[]? | "  \(.["lifecycle-state"] // "?")  \(.id)"' list.json
          OCID=$(jq -r '[(.data.items // .data // [])[]? | select((.["lifecycle-state"] // "")=="ACTIVE") | .id][0] // ""' list.json)
          if [ -z "$OCID" ]; then
            echo "::error::no ACTIVE container instance named 'bamcp' in compartment $COMPARTMENT"
            exit 1
          fi
          echo "Resolved bamcp instance: $OCID"
          OCI_CONTAINER_INSTANCE_OCID="$OCID" pnpm exec greenlight deploy bamcp --env prod
      - name: Verify prod (gate the self-heal on real health, not just the restart)
        # BAMCP_VERIFY_TOKEN (optional) enables the authenticated functional/eval mcp check; absent →
        # the api 401 check alone confirms the server is back (see verify/bamcp.config.ts).
        env:
          BAMCP_VERIFY_TOKEN: ${{ secrets.BAMCP_VERIFY_TOKEN }}
        run: pnpm exec greenlight verify bamcp --env prod
      - name: Escalate if the self-heal failed
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create --repo ${{ github.repository }} \
            --title "remediate-bamcp: self-heal FAILED" \
            --body "Automatic remediation for bamcp (reason: ${{ github.event.client_payload.reason }}) did not bring prod back. Manual attention needed." \
            --label keepalive || true
