name: greenlight-deploy-bamcp

# Option B: RTrentJones/BAMCP fires repository_dispatch(deploy-bamcp) after pushing a new image.
on:
  repository_dispatch:
    types: [deploy-bamcp]
  workflow_dispatch:

permissions:
  contents: read

# Share the self-heal workflow's group so a deploy and a remediation never run at the same time.
concurrency:
  group: deploy-bamcp
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: pnpm install --frozen-lockfile
      # The deploy "succeeds" only if the NEW image is actually serving — the composite resolves the
      # instance, restarts it (re-pull), and verifies prod (oci is verify-gated direct-to-prod). A
      # failure fails the job → the status posted back to BAMCP is red.
      - uses: ./.github/actions/oci-deploy-verify
        with:
          oci-tenancy: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.TF_VAR_OCI_REGION }}
          oci-compartment: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
          verify-token: ${{ secrets.BAMCP_VERIFY_TOKEN }}
      - name: Report status back to RTrentJones/BAMCP
        if: ${{ always() && github.event.client_payload.sha != '' }}
        env:
          # Per-tool name: the status PAT lives on the shared wrapper, scoped to BAMCP's repo.
          GH_TOKEN: ${{ secrets.GREENLIGHT_STATUS_TOKEN_BAMCP }}
          # env-indirect the UNTRUSTED repository_dispatch payload (mirrors greenlight-remediate-bamcp's
          # REASON pattern) so a crafted `sha` can't break out of the gh-api command line.
          SHA: ${{ github.event.client_payload.sha }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [ -z "$GH_TOKEN" ] && exit 0
          # Validate the caller-supplied commit SHA (40 hex) before binding it into the API path.
          if [[ ! "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::warning::client_payload.sha is not a 40-char hex commit SHA — skipping status post"
            exit 0
          fi
          gh api "repos/RTrentJones/BAMCP/statuses/$SHA" \
            -f state="$STATE" \
            -f context="greenlight/deploy-bamcp" \
            -f description="$JOB_STATUS"
