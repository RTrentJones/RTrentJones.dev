name: greenlight-deploy-polyphony

# Option B: RTrentJones/Polyphony fires repository_dispatch(deploy-polyphony) after pushing a new
# image (its build is gated on the tool's own test suite).
on:
  repository_dispatch:
    types: [deploy-polyphony]
  workflow_dispatch:

permissions:
  contents: read

# Share the self-heal workflow's group so a deploy and a remediation never run at the same time.
concurrency:
  group: deploy-polyphony
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile
      # The deploy "succeeds" only if the NEW image is actually serving — the composite resolves the
      # instance, restarts it (re-pull), and verifies prod (oci is verify-gated direct-to-prod). A
      # failure fails the job → the status posted back to Polyphony is red.
      - uses: ./.github/actions/oci-deploy-verify
        with:
          tool-name: polyphony
          oci-tenancy: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
          oci-user: ${{ secrets.TF_VAR_OCI_USER_OCID }}
          oci-fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
          oci-private-key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
          oci-region: ${{ secrets.TF_VAR_OCI_REGION }}
          oci-compartment: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
      - name: Report status back to RTrentJones/Polyphony
        if: ${{ always() && github.event.client_payload.sha != '' }}
        env:
          # Per-tool name: the status PAT lives on the shared wrapper, scoped to Polyphony's repo.
          GH_TOKEN: ${{ secrets.GREENLIGHT_STATUS_TOKEN_POLYPHONY }}
          # env-indirect the UNTRUSTED repository_dispatch payload so a crafted `sha` can't break
          # out of the gh-api command line.
          SHA: ${{ github.event.client_payload.sha }}
          STATE: ${{ job.status == 'success' && 'success' || 'failure' }}
          JOB_STATUS: ${{ job.status }}
        run: |
          [ -z "$GH_TOKEN" ] && exit 0
          # Validate the caller-supplied commit SHA (40 hex) before binding it into the API path.
          if [[ ! "$SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::warning::client_payload.sha is not a 40-char hex commit SHA — skipping status post"
            exit 0
          fi
          gh api "repos/RTrentJones/Polyphony/statuses/$SHA" \
            -f state="$STATE" \
            -f context="greenlight/deploy-polyphony" \
            -f description="$JOB_STATUS"
