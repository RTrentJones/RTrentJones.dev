name: infra

# Apply the wrapper's Terraform (HeistMind: Supabase + Vercel + DNS + keepalive) on push.
# State + locking live in HCP Terraform (workspace rtrentjones-dev, Local execution); the
# run happens here with the provider creds from GitHub Actions secrets. Plan -> apply.
on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: infra
  cancel-in-progress: false # never interrupt an in-flight apply

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }} # HCP state backend auth
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      VERCEL_API_TOKEN: ${{ secrets.VERCEL_API_TOKEN }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }} # github provider is required by a module but creates nothing
      # zone id is an enumerable identifier, not a secret — a repo variable (vars.*)
      TF_VAR_cloudflare_zone_id: ${{ vars.CLOUDFLARE_ZONE_ID }}
      # tracer (data: neon) — the neon provider reads NEON_API_KEY natively (like supabase reads
      # SUPABASE_ACCESS_TOKEN above). The Vercel project id is a non-secret HCP workspace var.
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      # tracer pass-two runtime secrets, wired into the Vercel env by tracer.tf. All optional — an unset
      # secret is "" → that capability is disabled at runtime (ingest fails closed; provider skipped).
      TF_VAR_tracer_ingest_token: ${{ secrets.TF_VAR_TRACER_INGEST_TOKEN }}
      TF_VAR_tracer_anthropic_api_key: ${{ secrets.TF_VAR_TRACER_ANTHROPIC_API_KEY }}
      TF_VAR_tracer_gemini_api_key: ${{ secrets.TF_VAR_TRACER_GEMINI_API_KEY }}
      TF_VAR_tracer_xai_api_key: ${{ secrets.TF_VAR_TRACER_XAI_API_KEY }}
      # DB password is inert on the imported project (the module pins ignore_changes) — never
      # written to the live DB — but the supabase provider length-validates it at plan time. The
      # `|| 'import-placeholder'` fallback means an UNSET secret yields a valid ≥4-char value (an
      # unset secret is "" and would otherwise override the var default). Set a dummy (≥4 chars) to
      # replace it; a real from-scratch recreate is the only time it needs a genuine value.
      TF_VAR_heistmind_supabase_database_password: ${{ secrets.TF_VAR_HEISTMIND_SUPABASE_DATABASE_PASSWORD || 'import-placeholder' }}
      # keepalive Worker token: github-issue alerts (Issues:write) + auto-heal repository_dispatch
      # (Contents:write). Empty/unset → keepalive still pings, but alerts + self-heal no-op.
      TF_VAR_keepalive_github_token: ${{ secrets.TF_VAR_KEEPALIVE_GITHUB_TOKEN }}
      # HeistMind prod ship-gate: admin token to manage RTrentJones/HeistMind branch protection
      # (administration:write). Empty/unset → branch protection not managed (apply still succeeds).
      TF_VAR_heistmind_github_admin_token: ${{ secrets.TF_VAR_HEISTMIND_GITHUB_ADMIN_TOKEN }}
      # HeistMind Discord OAuth (Supabase auth provider). Discord app is created manually; these
      # are its creds. Empty/unset → Discord auth stays disabled (apply unchanged).
      TF_VAR_heistmind_discord_client_id: ${{ secrets.TF_VAR_HEISTMIND_DISCORD_CLIENT_ID }}
      TF_VAR_heistmind_discord_client_secret: ${{ secrets.TF_VAR_HEISTMIND_DISCORD_CLIENT_SECRET }}
      # BAMCP — OCI provider auth (API-key signing). The VCN/subnet/AD are IaC (oci-network
      # module + AD data source), so only the auth values + optional compartment are secrets.
      TF_VAR_oci_tenancy_ocid: ${{ secrets.TF_VAR_OCI_TENANCY_OCID }}
      TF_VAR_oci_user_ocid: ${{ secrets.TF_VAR_OCI_USER_OCID }}
      TF_VAR_oci_fingerprint: ${{ secrets.TF_VAR_OCI_FINGERPRINT }}
      TF_VAR_oci_private_key: ${{ secrets.TF_VAR_OCI_PRIVATE_KEY }}
      TF_VAR_oci_region: ${{ secrets.TF_VAR_OCI_REGION }}
      TF_VAR_oci_compartment_id: ${{ secrets.TF_VAR_OCI_COMPARTMENT_ID }}
      # BAMCP M2M service token for the CI verify — same secret the deploy/remediate verify step
      # presents. Empty/unset → functional verify dormant (the 401 smoke still gates).
      TF_VAR_bamcp_verify_token: ${{ secrets.BAMCP_VERIFY_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '~1.10'
          terraform_wrapper: false
      - run: terraform -chdir=infra init -input=false
      - run: terraform -chdir=infra plan -input=false -out=tf.plan
      - run: terraform -chdir=infra apply -input=false tf.plan
