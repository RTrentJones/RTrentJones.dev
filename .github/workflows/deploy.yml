name: deploy

# develop -> beta, main -> prod. Creds-guarded: skips cleanly without CLOUDFLARE_API_TOKEN.
# Calls the Greenlight CLI (from the framework packages). (PR -> preview not wired —
# Workers preview URLs aren't deterministic; verify --env preview throws by design.)
on:
  push:
    branches: [develop, main]
  # Daily prod refresh so the build-time-fetched pg_kafka evidence (the grid/numbers, pulled from
  # pg_kafka's evidence branch) stays current without any cross-repo trigger. Scheduled runs use the
  # default branch (main) → prod; beta refreshes on develop pushes. Also manually dispatchable.
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Initialize submodules so doctor's submodule/spec checks see real state — required for
          # --strict below (an uninitialized submodule is a warning, and warnings now gate).
          submodules: true
      - uses: jdx/mise-action@c37c93293d6b742fc901e1406b8f764f6fb19dac # v2.4.4
      - run: pnpm install --frozen-lockfile

      # Consistency gate (no creds): infra ?ref drift vs the installed version, manifest
      # coherence, token scoping, submodule state. STRICT: warnings gate too — a tool drifting
      # from the model (missing verify spec, unscoped token) fails CI instead of informing it.
      - name: Doctor (consistency, strict)
        run: pnpm exec greenlight doctor --strict

      - name: Resolve target env
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          else
            echo "env=beta" >> "$GITHUB_OUTPUT"
          fi

      - name: Check Cloudflare creds
        id: creds
        env:
          CF: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF" ]; then echo "have=1" >> "$GITHUB_OUTPUT"; else echo "have=0" >> "$GITHUB_OUTPUT"; fi

      - name: Deploy + verify
        if: steps.creds.outputs.have == '1'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          pnpm exec greenlight deploy blog --env "${{ steps.env.outputs.env }}"
          pnpm exec greenlight verify blog --env "${{ steps.env.outputs.env }}"

      - name: Skip notice
        if: steps.creds.outputs.have != '1'
        run: echo "No CLOUDFLARE_API_TOKEN secret — deploy/verify skipped."
